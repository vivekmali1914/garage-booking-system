<link rel="stylesheet" href="style.css">


<div class="navbar">
    <h2>Garage Booking System</h2>
    <button onclick="logout()">Logout</button>
</div>

  <h1>Add Your Garage</h1>
<div style="text-align:center;">
    <input type="text" id="name" placeholder="Garage Name"><br><br>
    <input type="text" id="location" placeholder="Location"><br><br>
    <input type="number" id="capacity" placeholder="Capacity"><br><br>

    <label>Opening Time:</label>
    <input type="time" id="open"><br><br>

    <label>Closing Time:</label>
    <input type="time" id="close"><br><br>

    <button onclick="addGarage()">Add Garage</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location = "login.html";
}

function addGarage(){
    let name = document.getElementById("name").value;
    let location = document.getElementById("location").value;
    let capacity = document.getElementById("capacity").value;
    let opening_time = document.getElementById("open").value;
    let closing_time = document.getElementById("close").value;

    fetch("http://localhost:3000/add-garage", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            location,
            capacity,
            opening_time,
            closing_time,
            owner_id: user.id
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);

        // redirect to dashboard
        window.location.href = "admin.html";
    });
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
};
</script>
