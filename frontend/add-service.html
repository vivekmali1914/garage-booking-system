<link rel="stylesheet" href="style.css">

<div class="navbar">
    <button onclick="goBack()" style="margin:10px;">⬅ Back</button>
    <h2>Garage Booking System</h2>
    <button onclick="logout()">Logout</button>
</div>

<h1>Add Service</h1>

<div class="form-container">
    <input type="text" id="name" placeholder="Service Name"><br><br>
    <input type="number" id="duration" placeholder="Duration (minutes)"><br><br>
    <input type="number" id="price" placeholder="Price"><br><br>

    <button onclick="addService()">Add Service</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location = "login.html";
}

function addService(){
    let name = document.getElementById("name").value;
    let duration = document.getElementById("duration").value;
    let price = document.getElementById("price").value;

    fetch("https://garage-booking-system-1.onrender.com/add-service", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name,
            duration,
            price,
            garage_id: user.garage_id
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
    });
}

function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
};

function goBack(){
    if(document.referrer){
        window.history.back();
    } else {
        window.location.href = "index.html"; // fallback
    }
}
    
</script>
