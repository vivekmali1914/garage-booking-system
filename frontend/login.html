<link rel="stylesheet" href="style.css">

<div class="navbar">
    <h2>Garage Booking System</h2>
</div>

<div class="form-container">
    <h1>Login</h1>

    <input type="email" id="email" placeholder="Email"><br><br>
    
    <div class="password-box">
    <input type="password" id="password" placeholder="Password">
    <span onclick="togglePassword()" id="toggleIcon">👁️</span>
    </div>
    <br>

    <button onclick="login()">Login</button>

    <p>Don't have an account?</p>
    <a href="register.html">Register here</a>
</div>
  
<script>
function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    fetch("https://garage-booking-system-1.onrender.com/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {

        console.log(data);

        // ❌ handle error string
        if(typeof data === "string"){
            alert(data);
            return;
        }

        // ✅ save user
        localStorage.setItem("user", JSON.stringify(data.user));

        alert(data.message);

        // 🔥 HANDLE BOTH ROLES
        if(data.user.role === "garage_owner"){
            if(!data.user.garage_id){
                window.location.href = "add-garage.html";
            } else {
                window.location.href = "admin.html";
            }
        } 
        else if(data.user.role === "customer"){
            window.location.href = "index.html";
        }
    })
    .catch(err => {
        console.log(err);
        alert("Login failed ❌");
    });
}

function togglePassword() {
    let password = document.getElementById("password");
    let icon = document.getElementById("toggleIcon");

    if (password.type === "password") {
        password.type = "text";
        icon.textContent = "🙈";
    } else {
        password.type = "password";
        icon.textContent = "👁️";
    }
}
</script>
