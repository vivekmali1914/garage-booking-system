<script>
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location = "login.html";
}

function addVehicle(){
    let model = document.getElementById("model").value.trim();
    let number_plate = document.getElementById("plate").value.trim().toUpperCase();

    if(!model || !number_plate){
        alert("All fields are required ❌");
        return;
    }

    // 1. First, check if the vehicle already exists
    fetch(`https://garage-booking-system-1.onrender.com/vehicles/${user.id}`)
    .then(res => res.json())
    .then(vehicles => {
        let alreadyExists = vehicles.some(v => 
            v.number_plate.toUpperCase() === number_plate
        );

        if(alreadyExists){
            alert("Vehicle already available ❌");
            return; // Stop here
        }

        // 2. If it doesn't exist, proceed with the POST request
        // This MUST be inside this .then block
        return fetch("https://garage-booking-system-1.onrender.com/add-vehicle", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                user_id: user.id,
                model,
                number_plate
            })
        });
    })
    .then(res => {
        if(res) return res.text();
    })
    .then(data => {
        if(data) {
            alert(data);
            window.location.href = "index.html";
        }
    })
    .catch(err => {
        console.error("Error:", err);
        alert("Server error. Please try again later.");
    });
}

function logout(){
    localStorage.removeItem("user");
    window.location = "login.html";
}
</script>
